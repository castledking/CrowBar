name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "::error::Missing release version"
            exit 1
          fi

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "::error::Release tags must use v<semver>, for example v0.1.0"
            exit 1
          fi

          NOTES=".release/latest/v${VERSION}.md"
          ARCHIVE_21="$(grep '^archives_base_name=' version21/gradle.properties | cut -d= -f2)"
          ARCHIVE_26="$(grep '^archives_base_name=' version26/gradle.properties | cut -d= -f2)"
          JAR_21="${ARCHIVE_21}-${VERSION}.jar"
          JAR_26="${ARCHIVE_26}-${VERSION}.jar"

          if [ ! -f "$NOTES" ]; then
            echo "::error file=${NOTES}::Missing release notes for v${VERSION}"
            exit 1
          fi

          sed -i "s/^mod_version=.*/mod_version=${VERSION}/" gradle.properties

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"
          echo "jar_21=${JAR_21}" >> "$GITHUB_OUTPUT"
          echo "jar_26=${JAR_26}" >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<__CROWBAR_CHANGELOG__"
            cat "$NOTES"
            echo "__CROWBAR_CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

      - name: Build release jars
        run: ./gradlew :version21:build :version26:build --no-daemon

      - name: Verify release assets
        shell: bash
        run: |
          test -f "version21/build/libs/${{ steps.meta.outputs.jar_21 }}"
          test -f "version26/build/libs/${{ steps.meta.outputs.jar_26 }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CrowBar v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            version21/build/libs/${{ steps.meta.outputs.jar_21 }}
            version26/build/libs/${{ steps.meta.outputs.jar_26 }}

      - name: Publish 1.21.x to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: yP7IdsBH
          name: CrowBar v${{ steps.meta.outputs.version }} for 1.21.6-1.21.11
          version: ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.meta.outputs.changelog }}
          loaders: fabric
          game-versions: |-
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.10
            1.21.11
          files: |-
            version21/build/libs/${{ steps.meta.outputs.jar_21 }}
          primary-file: ${{ steps.meta.outputs.jar_21 }}

      - name: Publish 26.1.x to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: yP7IdsBH
          name: CrowBar v${{ steps.meta.outputs.version }} for 26.1.x
          version: ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.meta.outputs.changelog }}
          loaders: fabric
          game-versions: ">=26.1.2 <26.2"
          files: |-
            version26/build/libs/${{ steps.meta.outputs.jar_26 }}
          primary-file: ${{ steps.meta.outputs.jar_26 }}

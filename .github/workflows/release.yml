name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "::error::Missing release version"
            exit 1
          fi

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "::error::Release tags must use v<semver>, for example v0.1.0"
            exit 1
          fi

          MC_VERSION="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)"
          NOTES=".release/latest/v${VERSION}.md"
          JAR="CrowBar-${MC_VERSION}-${VERSION}.jar"
          SOURCES_JAR="CrowBar-${MC_VERSION}-${VERSION}-sources.jar"

          if [ ! -f "$NOTES" ]; then
            echo "::error file=${NOTES}::Missing release notes for v${VERSION}"
            exit 1
          fi

          sed -i "s/^mod_version=.*/mod_version=${VERSION}/" gradle.properties

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "mc_version=${MC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"
          echo "jar=${JAR}" >> "$GITHUB_OUTPUT"
          echo "sources_jar=${SOURCES_JAR}" >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<__CROWBAR_CHANGELOG__"
            cat "$NOTES"
            echo "__CROWBAR_CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: ./gradlew build --no-daemon

      - name: Verify release assets
        shell: bash
        run: |
          test -f "build/libs/${{ steps.meta.outputs.jar }}"
          test -f "build/libs/${{ steps.meta.outputs.sources_jar }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: CrowBar v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            build/libs/${{ steps.meta.outputs.jar }}
            build/libs/${{ steps.meta.outputs.sources_jar }}

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: yP7IdsBH
          name: CrowBar v${{ steps.meta.outputs.version }}
          version: ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.meta.outputs.changelog }}
          loaders: fabric
          game-versions: ${{ steps.meta.outputs.mc_version }}
          files: build/libs/${{ steps.meta.outputs.jar }}
          primary-file: ${{ steps.meta.outputs.jar }}
